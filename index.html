<!DOCTYPE html>
<html>
<head>
  <title>Payment</title>
</head>

<body>

  <h2>Payment System</h2>

  <!-- ✅ ADD THIS INPUT -->
  <input id="amount" type="number" value="10" placeholder="Enter amount" />

  <button onclick="pay()">Generate QR</button>

  <p id="status"></p>
  <div id="qrcode"></div>

  <script>
    function pay() {
      const amount = document.getElementById("amount").value;

      alert("Amount entered: " + amount);
    }
  </script>

</body>
</html>
