<!DOCTYPE html>
<html>
<head>
  <title>QR Payment</title>
</head>
<body>

<h2>QR Payment</h2>

<!-- INPUT (this is what you're missing) -->
<input id="amount" type="number" placeholder="Enter amount" />

<br><br>

<!-- BUTTON -->
<button onclick="generateQR()">Generate QR</button>

<br><br>

<canvas id="qr"></canvas>

<p id="status"></p>

<script>
async function generateQR() {
  const amount = document.getElementById("amount").value;

  console.log("Amount:", amount);

  if (!amount) {
    alert("Please enter amount");
    return;
  }

  const res = await fetch("/api/create-qr", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ amount })
  });

  const data = await res.json();

  console.log("API RESPONSE:", data);

  const qr = data.qr || data.code_url || data.qr_code;

  if (!qr) {
    document.getElementById("status").innerText = "❌ QR missing";
    return;
  }

  document.getElementById("status").innerText = "QR generated";
}
</script>

</body>
</html>
