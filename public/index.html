<!DOCTYPE html>
<html>
<head>
  <title>QR Payment</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>
<body>

<h2>QR Payment</h2>

<input id="amount" type="number" placeholder="Enter amount" />
<button onclick="generateQR()">Generate QR</button>

<br><br>

<canvas id="qr"></canvas>
<p id="status"></p>

<script>
let orderId = null;

async function generateQR() {
  const amount = document.getElementById("amount").value;

  if (!amount) {
    alert("Enter amount");
    return;
  }

  document.getElementById("status").innerText = "Generating...";

  const res = await fetch("/api/create", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ amount })
  });

  const data = await res.json();
  console.log("RESPONSE:", data);

  // SAFE QR extraction (fixes your issue)
  const qr =
    data.qr ||
    data.code_url ||
    data.qr_code ||
    data.data?.qr ||
    data.data?.qrCode ||
    data.data?.code_url ||
    data.result?.code_url;

  orderId = data.orderId;

  if (!qr) {
    document.getElementById("status").innerText = "❌ QR missing";
    return;
  }

  QRCode.toCanvas(document.getElementById("qr"), qr);

  document.getElementById("status").innerText = "Waiting payment...";

  checkPayment();
}

function checkPayment() {
  const interval = setInterval(async () => {
    const res = await fetch(`/api/check?id=${orderId}`);
    const data = await res.json();

    if (data.status === "SUCCESS") {
      document.getElementById("status").innerText = "✅ Paid";
      clearInterval(interval);
    }
  }, 3000);
}
</script>

</body>
</html>
