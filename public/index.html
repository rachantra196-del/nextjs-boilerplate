<!DOCTYPE html>
<html>
<body style="text-align:center;">

<h1>HFCB Payment Gateway</h1>

<button onclick="createQR()">Generate QR Payment</button>

<div id="result"></div>

<script>
async function createQR() {
    const res = await fetch('/api/nativeqr');
    const data = await res.json();

    if (data.qr) {
        document.getElementById('result').innerHTML =
            `<h3>Scan to Pay</h3><img src="${data.qr}" />`;
    } else if (data.link) {
        window.location.href = data.link;
    } else {
        document.getElementById('result').innerHTML = "Error creating payment";
    }
}
</script>

</body>
</html>
