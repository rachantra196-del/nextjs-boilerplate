<!DOCTYPE html>
<html>
<head>
  <title>QR Payment</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <link rel="icon" href="data:,">
</head>
<body>

<h2>QR Payment</h2>

<input id="amount" type="number" placeholder="Enter amount" />
<button onclick="generateQR()">Generate QR</button>

<br><br>

<canvas id="qr"></canvas>
<p id="status"></p>

<script>
let orderId = null;

async function generateQR() {
  const amount = document.getElementById("amount").value;

  if (!amount) {
    alert("Enter amount");
    return;
  }

  document.getElementById("status").innerText = "Generating...";

  const res = await fetch("/api/create", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ amount })
  });

  const text = await res.text();
  console.log("RAW:", text);

  let data;
  try {
    data = JSON.parse(text);
  } catch (e) {
    document.getElementById("status").innerText = "❌ Server error";
    return;
  }

  if (!data.qr) {
    document.getElementById("status").innerText = "❌ QR missing";
    return;
  }

  orderId = data.orderId;

  QRCode.toCanvas(document.getElementById("qr"), data.qr);

  document.getElementById("status").innerText = "Waiting payment...";

  checkPayment();
}

function checkPayment() {
  const interval = setInterval(async () => {
    const res = await fetch(`/api/check?id=${orderId}`);
    const data = await res.json();

    if (data.status === "SUCCESS") {
      document.getElementById("status").innerText = "✅ Paid";
      clearInterval(interval);
    }
  }, 3000);
}
</script>

</body>
</html>
