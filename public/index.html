<button onclick="generateQR()">Generate QR</button>

<br><br>

<canvas id="qr"></canvas>

<br><br>

<button id="payBtn" style="display:none;" onclick="openPay()">
  💳 Pay Now (Mobile)
</button>

<p id="status"></p>

<script>
let orderId = null;
let deeplink = null;

async function generateQR() {
  const amount = document.getElementById("amount").value;

  const res = await fetch("/api/create-qr", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ amount })
  });

  const data = await res.json();

  console.log("API:", data);

  const qr = data.qr;
  deeplink = data.deeplink;
  orderId = data.out_trade_no;

  if (!qr && !deeplink) {
    document.getElementById("status").innerText = "❌ No QR or deeplink";
    return;
  }

  // show QR if exists
  if (qr) {
    QRCode.toCanvas(document.getElementById("qr"), qr);
  }

  // show deeplink button if exists
  if (deeplink) {
    document.getElementById("payBtn").style.display = "block";
  }

  document.getElementById("status").innerText = "Waiting for payment...";
}

function openPay() {
  if (deeplink) {
    window.location.href = deeplink;
  }
}
</script>
